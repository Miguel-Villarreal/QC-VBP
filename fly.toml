# fly.toml app configuration file generated for qc-inspector-vbp on 2026-03-16T19:05:20-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'qc-inspector-vbp'
primary_region = 'dfw'

[build]

[env]
  DB_PATH = '/data/qc.db'
  UPLOADS_DIR = '/data/uploads'

[[mounts]]
  source = 'qc_data'
  destination = '/data'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
