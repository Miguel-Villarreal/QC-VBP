services:
  qc-inspector:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - qc-data:/app/backend/data
      - qc-uploads:/app/backend/uploads
    environment:
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env file or environment}
      - DB_PATH=/app/backend/data/qc.db

volumes:
  qc-data:
  qc-uploads:
